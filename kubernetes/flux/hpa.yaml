apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flux-worker-hpa
  namespace: ai-workers
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flux-worker

  minReplicas: 0   # scale-to-zero when idle (requires KEDA or similar)
  maxReplicas: 5

  metrics:
    # Scale on CPU as a proxy for inference load
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # 5 min cool-down before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
