apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ltxvideo-worker-hpa
  namespace: ai-workers
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ltxvideo-worker

  minReplicas: 0
  maxReplicas: 3   # video gen is expensive; keep max lower

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
