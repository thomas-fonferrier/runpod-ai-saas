name: Build & Push — XTTS v2 worker

on:
  push:
    branches: [main]
    paths:
      - "workers/xtts/**"
      - ".github/workflows/build-xtts.yml"
  pull_request:
    branches: [main]
    paths:
      - "workers/xtts/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (default: sha)"
        required: false
        default: ""

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/runpod-xtts

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          SHA_TAG="${{ github.sha }}"
          echo "sha=${SHA_TAG::8}" >> "$GITHUB_OUTPUT"
          echo "custom=${INPUT_TAG:-latest}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./workers/xtts
          file: ./workers/xtts/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BAKE_MODELS=0
