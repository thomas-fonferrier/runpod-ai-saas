apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: xtts-worker-hpa
  namespace: ai-workers
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: xtts-worker

  minReplicas: 0
  maxReplicas: 10   # TTS is fast and light — can scale high

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 3
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
