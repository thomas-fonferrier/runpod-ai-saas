apiVersion: apps/v1
kind: Deployment
metadata:
  name: ltxvideo-worker
  namespace: ai-workers
  labels:
    app: ltxvideo-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ltxvideo-worker
  template:
    metadata:
      labels:
        app: ltxvideo-worker
    spec:
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: ltxvideo-worker
          image: ${DOCKERHUB_USERNAME}/runpod-ltxvideo:latest
          imagePullPolicy: Always

          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: "48Gi"
            requests:
              nvidia.com/gpu: "1"
              memory: "24Gi"

          env:
            - name: MODEL_PATH
              value: "/runpod-volume/models/ltxvideo"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-worker-secrets
                  key: hf_token
            - name: RUNPOD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-worker-secrets
                  key: runpod_api_key

          ports:
            - containerPort: 8000

          volumeMounts:
            - name: model-storage
              mountPath: /runpod-volume

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 60
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10

      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-pvc
